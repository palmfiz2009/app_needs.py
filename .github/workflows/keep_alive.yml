name: Wake up Streamlit
on:
  schedule:
    - cron: '0 * * * *' # 1時間に1回実行（毎時0分）
  workflow_dispatch: # 手動で実行できるボタンも追加しておきます

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping my app
        # ★以下のURLを、対象アプリの実際のStreamlit URLに書き換えてください★
        run: curl -I https://your-app-name.streamlit.app
